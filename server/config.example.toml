[probe]
interval_secs = 60
timeout_ms = 1500
parallelism = 8

[catalog]
refresh_interval_secs = 3600

[epg]
ttl_secs = 1800
fetch_timeout_secs = 10

[blacklist]
host_fail_threshold = 4
url_ttl_secs = 3600
host_ttl_secs = 3600
demote_ttl_secs = 10800

[proxy]
upstream_timeout_secs = 15
segment_buffer_bytes = 65536
play_budget_secs = 10
per_attempt_timeout_secs = 5
opportunistic_validate_count = 2
opportunistic_validate_timeout_secs = 4
