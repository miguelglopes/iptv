listen_addr = "0.0.0.0:8080"
# `public_base_url` is OPTIONAL. The server normally derives the URL prefix it
# advertises (play_url, segment links) from each request's
# X-Forwarded-Proto / X-Forwarded-Host / Host headers, so the same instance
# serves correct URLs over LAN, public IP, or a reverse-proxy hostname without
# per-deploy tuning. Set this only if you want to override that — or as a
# fallback for clients that don't send a Host header.
# public_base_url = "http://example.com"

# Static UI assets served as fallback. Defaults to "../app" — resolves to the
# repo's app/ both for `cargo run` from server/ and inside the Docker container
# (WORKDIR /srv/iptv-proxy, app/ mounted at /srv/app).
# ui_dir = "../app"

[xtream]
username = "REPLACE_ME"
password = "REPLACE_ME"
hosts = [
    "http://cf.8kgaminghub.shop",
    "http://cf.gaminhub.sbs",
    "http://cf.business-cloud-8k.com",
    "http://pro.292910.xyz",
    "http://cf.humari.xyz",
    "http://pro.003391.xyz",
    "http://cf.0006652.xyz",
    "http://cf.4kdream.cloud",
    "http://cf.gocdn8k.me",
    "http://cf.super-gaminhub.xyz",
    "http://cf.vip8kgaming.xyz",
    "http://cf.supergaminghub.xyz",
    "http://cf.business-cdn-8k.su",
    "http://smarter8k.su",
    "http://cf.business-cdn.me",
    "http://rss14079.cdn-mx.me",
    "http://cf.hi-ott.me",
]

[probe]
interval_secs = 60
timeout_ms = 1500
parallelism = 8

[catalog]
refresh_interval_secs = 3600

[epg]
ttl_secs = 1800
fetch_timeout_secs = 10

[blacklist]
host_fail_threshold = 4
url_ttl_secs = 3600
host_ttl_secs = 3600
demote_ttl_secs = 10800
# Number of URL-level failures within `url_fail_window_secs` before a URL is
# hard-blacklisted (build_candidates skips it entirely). First N-1 failures
# still demote the URL — it sinks to the back of the candidate queue but stays
# tried. Threshold absorbs network blips and occasional cross-client misblame.
url_fail_threshold = 3
url_fail_window_secs = 300

[proxy]
upstream_timeout_secs = 15
segment_buffer_bytes = 65536
# Upper bound on a single play request. With per_attempt_timeout_secs=5 this
# allows ~12 candidate attempts; in practice candidates exhaust well before.
play_budget_secs = 60
per_attempt_timeout_secs = 5
opportunistic_validate_count = 2
opportunistic_validate_timeout_secs = 6

# Optional taste / locale knobs. Omit the whole section to get a neutral catalog:
# channels appear in alphabetical-by-display-name order, with only universal
# quality-tier scoring (RAW > 4K > FHD > HD > SD) and no name aliasing.
[curation]
# Channels pinned to the top of the list, in this order. Names are matched
# case-insensitively after canonicalization (strip prefix / quality / accents /
# punctuation, lowercase, ASCII alphanumeric only). Channels not listed appear
# after, sorted alphabetically by display name.
order = [
    # "newschannelhd",
    # "sportshd",
]

# Score bonuses applied to channel-variant names matching a regex. Useful to prefer
# your ISP's branded streams over generic ones when several feeds carry the same
# channel. Score is added to the variant's quality-tier score.
provider_boosts = [
    # { pattern = "(?i)VODAFONE", score = 3 },
    # { pattern = "(?i)MEO", score = 2 },
]

# Maps an alias canonical key → its target canonical key, so different name
# spellings collapse into the same channel. Keys are post-canonicalization (lower,
# ASCII alphanumeric). Use the [curation.aliases] sub-table form — TOML inline
# tables can't span lines with comments.
#
# Sub-tables MUST appear after the inline-style fields above: in TOML a
# [parent.child] header ends the parent table's scope.
[curation.aliases]
# btv = "benfica"            # example: host shortens "Benfica TV" to "BTV"

# Pretty display name override, keyed by canonical key. Without this, the longer /
# more accented variant name wins.
[curation.display_overrides]
# benfica = "Benfica TV"

# Radio mode — parse a vendored M3U at every catalog refresh, merge resulting
# kind=Radio channels into the canonical list. Disabled by default; flip to true
# to surface a 📻 RADIO tab in the channel list alongside 📺 TV. v1 keeps only
# HLS (.m3u8) entries from the M3U; Icecast/MP3 entries are dropped silently.
# Recommended source: vendor activistpt/IPTV/radios.m3u as `radios.m3u` next to
# config.toml.
[radio]
enabled = false
m3u_path = "radios.m3u"

# Separate curation namespace for radio channels — same shape as [curation],
# independent so radio names don't collide with TV aliases. Empty defaults give
# alphabetical-by-display-name order.
[radio_curation]
order = [
    # "Antena 1", "Antena 2", "Antena 3", ...
]
[radio_curation.aliases]
[radio_curation.display_overrides]
