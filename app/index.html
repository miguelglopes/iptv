<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fourier</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="panel-list">
  <main id="app">
    <section class="left-col">
      <header>
        <div class="mode-tabs">
          <div class="tab active" data-mode="tv"><span class="icon">📺</span>TV<span class="count"></span></div>
          <div class="tab" data-mode="radio"><span class="icon">📻</span>RADIO<span class="count"></span></div>
        </div>
        <div class="header-meta">
          <div class="keymap-inline">
            <span class="chip" data-action="unrecent"><span class="k k-r">●</span> R Unpin</span>
            <span class="chip" data-action="mode"><span class="k k-g">●</span> G TV/Radio</span>
            <span class="chip" data-action="search"><span class="k k-y">●</span> Y Search</span>
          </div>
          <div class="hint"></div>
        </div>
      </header>
      <input id="search" class="search" placeholder="search…" autocomplete="off">
      <section id="list" class="list"></section>
    </section>
    <aside class="right-col">
      <div id="top-slot" class="top-slot">
        <div class="settings-title">Settings</div>
        <div class="settings-grid">
          <div class="settings-item" data-i="0">Reset blocked sources</div>
          <div class="settings-item" data-i="1">Reset source preferences</div>
          <div class="settings-item" data-i="2">Reset all source state</div>
          <div class="settings-item" data-i="3">Reprobe hosts</div>
          <div class="settings-item" data-i="4">Clear search history</div>
          <div class="settings-item" data-i="5">Clear recent channels</div>
          <div class="settings-item" data-i="6">Clear cached channels</div>
          <div class="settings-item" data-i="7">Re-detect playback caps</div>
          <div class="settings-item" data-i="8">Clear all (reload)</div>
        </div>
      </div>
      <div id="bottom-slot" class="bottom-slot"></div>
    </aside>
  </main>
  <div id="error"><header><h1>Error</h1></header><pre class="error-msg"></pre></div>
  <div id="overlay"></div>
  <div id="legend"></div>
  <div id="catchup-badge"></div>
  <div id="zap-banner"></div>
  <div id="zap-preview"></div>
  <!--PLAYER_BUNDLE_MARKER--><!-- server injects hls.js here for non-webOS UAs (see api::serve_index) -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
