services:
  iptv-proxy:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: iptv-proxy:local
    container_name: iptv-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./server/config.toml:/srv/iptv-proxy/config.toml:ro
      - ./app:/srv/app:ro
      # Override the gitignored app/js/config.js (which carries the LAN URL the
      # TV uses) with a same-origin config so the browser UI talks to this very
      # container regardless of how it was reached.
      - ./app/js/config.docker.js:/srv/app/js/config.js:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info,iptv_proxy=info}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
