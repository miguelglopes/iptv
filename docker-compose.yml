services:
  iptv-proxy:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: iptv-proxy:local
    container_name: iptv-proxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./server/config.toml:/srv/iptv-proxy/config.toml:ro
      - ./app:/srv/app:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info,iptv_proxy=info}
    dns:
      - 192.163.2.103
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
